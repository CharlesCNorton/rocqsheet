name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        coq_version:
          - "9.0"
        ocaml_version:
          - "4.14-flambda"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Normalize workspace permissions
        run: |
          sudo chmod -R a+rwX "$GITHUB_WORKSPACE"

      - name: Build project
        uses: coq-community/docker-coq-action@v1
        with:
          opam_file: "rocqsheet.opam"
          coq_version: ${{ matrix.coq_version }}
          ocaml_version: ${{ matrix.ocaml_version }}
          before_install: |
            startGroup "Install system packages"
              sudo apt-get update -y -q
              sudo apt-get install -y clang pkg-config cmake \
                libglfw3-dev libgl-dev
            endGroup
            startGroup "Mark workspace as git-safe"
              git config --global --add safe.directory "$PWD"
              git config --global --add safe.directory "$PWD/crane"
            endGroup
          install: |
            startGroup "Install opam dependencies"
              opam install -y --no-depexts rocq-runtime coq-itree coq-ext-lib coq-paco
              opam exec -- which coqc
            endGroup
            startGroup "Build and install local Crane"
              cd crane
              opam exec -- dune build -p rocq-crane @install
              opam exec -- dune install -p rocq-crane
              cd ..
            endGroup
          script: |
            startGroup "Extract and build kernel"
              opam exec -- make extract
            endGroup
            startGroup "Configure and build native executable + tests"
              opam exec -- make build
            endGroup
            startGroup "Run parser, kernel, torture, and headless smoke"
              opam exec -- make test
            endGroup
            startGroup "Headless --eval smoke against fixture"
              opam exec -- ./_build/cmake/rocqsheet --headless \
                --load tests/fixtures/headless_smoke.txt --eval D1 \
                | grep -q '^100$'
              opam exec -- ./_build/cmake/rocqsheet --headless \
                --load tests/fixtures/headless_smoke.txt --print-csv \
                | grep -q '100,100,100,100'
            endGroup
          uninstall: |
            startGroup "Skip opam uninstall"
              true
            endGroup
